<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Email Reviewer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ static_url('css/style.css') }}">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-6">
            <a href="/" class="text-lg font-semibold text-gray-900">Email Reviewer</a>
            <a href="/" class="text-sm text-gray-600 hover:text-gray-900">Leaderboard</a>
            <a href="/settings" class="text-sm text-gray-600 hover:text-gray-900">Settings</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
